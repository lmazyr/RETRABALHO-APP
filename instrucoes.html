<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrabalho | Instrucoes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>Retrabalho</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="lancamentos.html">Lancamentos</a>
        <a href="consultas.html">Consultas</a>
        <a href="pecas.html">Pecas</a>
        <a href="instrucoes.html" class="ativo">Instrucoes</a>
        <a href="index.html">index</a>
    </aside>

    <main class="conteudo">
        <div class="titulo-pagina">
            <h1>Instrucoes de Trabalho</h1>
            <p>Cadastre, consulte e visualize PDFs de instrucao por peca ou fabrica.</p>
        </div>

        <section class="card">
            <h2>Cadastro de instrucao</h2>
            <form id="formInstrucao" class="form-grid">
                <input type="hidden" id="instrucaoId">

                <div>
                    <label for="codigoInstrucao">Codigo da peca</label>
                    <input type="text" id="codigoInstrucao" placeholder="Ex.: 1868357" list="listaCodigosInstrucao" autocomplete="off" required>
                    <datalist id="listaCodigosInstrucao"></datalist>
                </div>

                <div>
                    <label for="fabricaInstrucao">Fabrica</label>
                    <select id="fabricaInstrucao" required>
                        <option value="">Selecione</option>
                        <option>AEN</option>
                        <option>AMN</option>
                        <option>ATN</option>
                        <option>ACN</option>
                        <option>AVN</option>
                        <option>ASN</option>
                    </select>
                </div>

                <div>
                    <label for="arquivoInstrucao">Arquivo PDF</label>
                    <input type="file" id="arquivoInstrucao" accept="application/pdf">
                </div>

                <div class="span-2">
                    <label for="tituloInstrucao">Titulo</label>
                    <input type="text" id="tituloInstrucao" placeholder="Ex.: Instrucao de retrabalho" required>
                </div>

                <div>
                    <label for="revisaoInstrucao">Revisao</label>
                    <input type="text" id="revisaoInstrucao" placeholder="Ex.: Rev. 01">
                </div>

                <div class="span-3">
                    <label for="observacaoInstrucao">Observacao</label>
                    <textarea id="observacaoInstrucao" placeholder="Detalhes importantes para a execucao"></textarea>
                </div>

                <div class="acoes-form span-3">
                    <button type="submit" class="btn-primario">Salvar instrucao</button>
                    <button type="button" id="btnLimparInstrucao" class="btn-secundario">Limpar</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Pesquisar</h2>
            <div class="filtros-grid">
                <div>
                    <label for="filtroFabrica">Fabrica</label>
                    <select id="filtroFabrica">
                        <option value="">Todas as fabricas</option>
                        <option>AEN</option>
                        <option>AMN</option>
                        <option>ATN</option>
                        <option>ACN</option>
                        <option>AVN</option>
                        <option>ASN</option>
                    </select>
                </div>

                <div class="span-2">
                    <label for="buscaPeca">Codigo ou descricao</label>
                    <input type="text" id="buscaPeca" placeholder="Digite para pesquisar" autocomplete="off">
                </div>
            </div>
        </section>

        <section class="card">
            <div class="cabecalho-lista">
                <h2>Instrucoes cadastradas</h2>
                <span id="totalInstrucoes" class="contador">0 registros</span>
            </div>
            <div id="listaInstrucoes" class="lista-instrucoes"></div>
        </section>
    </main>
</div>

<script src="js/pecas.js"></script>
<script src="js/app.js"></script>
<script src="js/instrucoes.js"></script>
</body>
</html>
