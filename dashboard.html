<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrabalho | Dashboard</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>Retrabalho</h2>
        <a href="dashboard.html" class="ativo">Dashboard</a>
        <a href="lancamentos.html">Lancamentos</a>
        <a href="consultas.html">Consultas</a>
        <a href="pecas.html">Pecas</a>
        <a href="instrucoes.html">Instrucoes</a>
    </aside>

    <main class="conteudo">
        <div class="titulo-pagina">
            <h1>Dashboard</h1>
            <p>Indicadores consolidados dos lancamentos registrados.</p>
        </div>

        <section class="card">
            <h2>Filtros</h2>
            <div class="filtros-grid">
                <div>
                    <label for="filtroData">Dia</label>
                    <input type="date" id="filtroData">
                </div>

                <div>
                    <label for="filtroFabrica">Fabrica</label>
                    <select id="filtroFabrica">
                        <option value="">Todas</option>
                        <option>AEN</option>
                        <option>AMN</option>
                        <option>ATN</option>
                        <option>ACN</option>
                        <option>AVN</option>
                        <option>ASN</option>
                    </select>
                </div>

                <div>
                    <label for="filtroColaborador">Colaborador</label>
                    <input type="text" id="filtroColaborador" placeholder="Nome do responsavel">
                </div>
            </div>

            <div class="acoes-form">
                <button type="button" class="btn-primario" onclick="carregarDashboard()">Aplicar filtros</button>
                <button type="button" class="btn-secundario" onclick="limparFiltrosDashboard()">Limpar filtros</button>
            </div>
        </section>

        <section class="cards">
            <div class="card dashboard-card">
                <h3>Total de registros</h3>
                <h2 id="totalRegistros">0</h2>
            </div>
            <div class="card dashboard-card">
                <h3>M.U registradas</h3>
                <h2 id="muDia">0</h2>
            </div>
            <div class="card dashboard-card">
                <h3>Total de pecas</h3>
                <h2 id="pecasDia">0</h2>
            </div>
            <div class="card dashboard-card">
                <h3>Pecas sem CC</h3>
                <h2 id="semCC">0</h2>
            </div>
        </section>

        <section class="card">
            <div class="cabecalho-lista">
                <h2>Producao por fabrica</h2>
                <span class="contador">Total de pecas</span>
            </div>
            <div id="graficoFabricas" class="grafico-barras"></div>
        </section>
    </main>
</div>

<script src="js/pecas.js"></script>
<script src="js/app.js"></script>
<script>
function carregarDashboard() {
    const dados = filtrarDashboard(obterLancamentosBase());
    const totalMU = dados.length;
    const totalPecas = dados.reduce((total, item) => total + Number(item.quantidadePecas || 0), 0);
    const semCC = dados.filter(item => !item.cc).length;

    document.getElementById("totalRegistros").textContent = dados.length;
    document.getElementById("muDia").textContent = totalMU;
    document.getElementById("pecasDia").textContent = totalPecas;
    document.getElementById("semCC").textContent = semCC;

    const fabricas = dados.reduce((grupo, item) => {
        const chave = item.fabrica || "Sem fabrica";
        grupo[chave] = (grupo[chave] || 0) + Number(item.quantidadePecas || 0);
        return grupo;
    }, {});

    renderizarGrafico(fabricas);
}

function filtrarDashboard(dados) {
    const data = document.getElementById("filtroData").value;
    const fabrica = document.getElementById("filtroFabrica").value;
    const colaborador = normalizarTexto(document.getElementById("filtroColaborador").value);

    return dados.filter(item => {
        const filtroData = !data || item.data === data;
        const filtroFabrica = !fabrica || item.fabrica === fabrica;
        const filtroColaborador = !colaborador || normalizarTexto(item.responsavel).includes(colaborador);

        return filtroData && filtroFabrica && filtroColaborador;
    });
}

function limparFiltrosDashboard() {
    document.getElementById("filtroData").value = "";
    document.getElementById("filtroFabrica").value = "";
    document.getElementById("filtroColaborador").value = "";
    carregarDashboard();
}

document.getElementById("filtroData").addEventListener("change", carregarDashboard);
document.getElementById("filtroFabrica").addEventListener("change", carregarDashboard);
document.getElementById("filtroColaborador").addEventListener("input", carregarDashboard);

function renderizarGrafico(fabricas) {
    const grafico = document.getElementById("graficoFabricas");
    const labels = Object.keys(fabricas);
    const valores = Object.values(fabricas);
    const maiorValor = Math.max(...valores, 1);

    if (labels.length === 0) {
        grafico.innerHTML = "<p class='sem-registros'>Nenhum lancamento para exibir.</p>";
        return;
    }

    grafico.innerHTML = labels.map(label => {
        const valor = fabricas[label];
        const largura = Math.max((valor / maiorValor) * 100, 4);

        return `
            <div class="barra-item">
                <div class="barra-info">
                    <strong>${label}</strong>
                    <span>${valor} pecas</span>
                </div>
                <div class="barra-trilho">
                    <div class="barra-preenchida" style="width:${largura}%"></div>
                </div>
            </div>
        `;
    }).join("");
}

carregarDashboard();
</script>
</body>
</html>
