<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrabalho | Pecas</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>Retrabalho</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="lancamentos.html">Lancamentos</a>
        <a href="consultas.html">Consultas</a>
        <a href="pecas.html" class="ativo">Pecas</a>
        <a href="instrucoes.html">Instrucoes</a>
    </aside>

    <main class="conteudo">
        <div class="titulo-pagina">
            <h1>Cadastro de Pecas</h1>
            <p>Mantenha a base usada nos lancamentos do retrabalho.</p>
        </div>

        <section class="card">
            <form id="formPeca" class="form-grid">
                <input type="hidden" id="indiceEdicao">

                <div>
                    <label for="codigo">Codigo da peca</label>
                    <input id="codigo" type="text" placeholder="Ex.: 1868357" autocomplete="off" required>
                </div>

                <div class="span-2">
                    <label for="descricao">Descricao</label>
                    <input id="descricao" type="text" placeholder="Nome da peca" autocomplete="off" required>
                </div>

                <div>
                    <label for="fabrica">Fabrica</label>
                    <select id="fabrica" required>
                        <option value="">Selecione</option>
                        <option>AEN</option>
                        <option>AMN</option>
                        <option>ATN</option>
                        <option>ACN</option>
                        <option>AVN</option>
                        <option>ASN</option>
                    </select>
                </div>

                <div>
                    <label for="cc">Centro de custo</label>
                    <input id="cc" type="text" placeholder="Pode ficar vazio" autocomplete="off">
                </div>

                <div>
                    <label for="pecasPorMU">Total de pecas da M.U</label>
                    <input id="pecasPorMU" type="number" min="1" step="1" placeholder="Ex.: 80" required>
                </div>

                <div class="acoes-form span-3">
                    <button type="submit" class="btn-primario">Salvar peca</button>
                    <button type="button" class="btn-secundario" id="btnLimpar">Limpar</button>
                </div>
            </form>
        </section>

        <section class="card">
            <div class="cabecalho-lista">
                <h2>Pecas cadastradas</h2>
                <input id="buscaPeca" class="busca-compacta" type="search" placeholder="Buscar codigo ou descricao">
            </div>

            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Codigo</th>
                            <th>Descricao</th>
                            <th>Fabrica</th>
                            <th>CC</th>
                            <th>Pecas/M.U</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPecas"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="js/pecas.js"></script>
<script src="js/app.js"></script>
<script src="js/cadastro.js"></script>
</body>
</html>
